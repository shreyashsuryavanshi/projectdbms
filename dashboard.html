<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
    <div class="theme-toggle dashboard-theme">
        <input type="checkbox" id="themeSwitch" class="theme-switch-input">
        <label for="themeSwitch" class="theme-switch-label">
            <span class="theme-icon sun">☀️</span>
            <span class="theme-icon moon">🌙</span>
        </label>
    </div>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="dashboard-wrapper">
        <div class="glass-card dashboard-container">
            <div class="dashboard-header">
                <div>
                    <h1 id="welcomeMessage">Loading...</h1>
                    <p class="subtitle">Welcome to your workspace.</p>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
            
            <div class="dashboard-grid">
                
                <!-- Profile Section -->
                <div class="widget profile-widget">
                    <h3>User Profile</h3>
                    <form id="profileForm">
                        <div class="input-group">
                            <input type="text" id="profileName" required>
                            <label for="profileName" class="active-label">Full Name</label>
                        </div>
                        <div class="input-group">
                            <input type="email" id="profileEmail" required>
                            <label for="profileEmail" class="active-label">Email</label>
                        </div>
                        <button type="submit" class="submit-btn small-btn" id="profileSubmit">Update Profile</button>
                    </form>
                </div>

                <!-- Todo List Section -->
                <div class="widget todo-widget">
                    <h3>Todo List</h3>
                    <form id="todoForm" class="todo-form">
                        <input type="text" id="todoInput" placeholder="What needs to be done?" required>
                        <button type="submit" class="submit-btn small-btn">+</button>
                    </form>
                    <ul class="todo-list" id="todoList">
                        <!-- Todos rendered here -->
                    </ul>
                </div>

                <!-- File Upload Section -->
                <div class="widget upload-widget">
                    <h3>Cloud Storage</h3>
                    <form id="uploadForm" class="upload-area">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p id="uploadStatusText">Select or drag a file to upload</p>
                        <input type="file" id="fileInput" required>
                        <button type="submit" class="submit-btn small-btn" id="uploadBtn" style="margin-top: 10px;">Upload</button>
                    </form>
                    <div id="uploadResult" class="upload-result"></div>
                </div>

            </div>
        </div>

        <!-- AI Chatbot Widget -->
        <div class="chat-widget" id="chatWidget">
            <div class="chat-header" id="chatHeader">
                <h4>AI Assistant</h4>
                <span id="chatToggle">▲</span>
            </div>
            <div class="chat-body collapsed" id="chatBody">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-msg bot">Hi! How can I help you today?</div>
                </div>
                <form id="chatForm" class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type a message..." required autocomplete="off">
                    <button type="submit">➤</button>
                </form>
            </div>
        </div>

        <!-- Logout Confirmation Modal -->
        <div class="modal-overlay" id="logoutModal">
            <div class="glass-card modal-content">
                <h3>Confirm Logout</h3>
                <p>Are you sure you want to end your session?</p>
                <div class="modal-actions">
                    <button class="submit-btn outline-btn" id="cancelLogout">Cancel</button>
                    <button class="submit-btn danger-btn" id="confirmLogout">Yes, Logout</button>
                </div>
            </div>
        </div>

    </div>

    <script src="theme.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
